<html>

<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    p {
      margin-bottom: 15px;
      color: #333;
    }
  </style>
</head>

<body>
  <div class="container">
    <p>El usuario {{username}}, registrado con el mail {{userEmail}} ha generado una orden por transferencia bancaria.</p>
    <p><strong>Propiedad:</strong> {{propertyName}}</p>
    <p><strong>Fecha de ingreso:</strong> {{startDate}}</p>
    <p><strong>Fecha de egreso:</strong> {{endDate}}</p>
    <p>Revisar y confirmar la recepción del comprobante para completar la orden.</p>
  </div>
</body>

</html>
