<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center
    }
    h1,
    p {
      color: #333;
      font-size: 23px
    }
    a {
      color: #3498db;
      text-decoration: none;
    }
    button {
      background-color: #3498db;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }
    footer {
      background-color: #004aad
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hola DUEÑO</h1>
    <p>Tiene un nuevo mensaje del formulario web de {{email}}</p>
    <p>{{name}}:</p>
    <p>{{message}}</p>
    <p>{{phone}}</p>
    <p>¡Esperamos que tengas un exclente día !</p>
    <hr />
  </div>
  <footer>
    <a href="https://www.href.com.ar/" target="_blank"><img style="width: 150px"
      src="https://www.href.com.ar/img/Logo-href.png" alt="logo-href" /></a>
  </footer>
</body>
</html>
